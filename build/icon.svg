<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0c5d56"/>
    </linearGradient>
    <linearGradient id="topGloss" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- macOS squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>
  <rect x="0" y="0" width="1024" height="512" rx="224" ry="224" fill="url(#topGloss)"/>

  <!-- 字母 B: 用系统字体 Helvetica/Arial Black 渲染, 最可靠 -->
  <text
    x="512" y="512"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="640"
    font-weight="900"
    fill="#ffffff"
    filter="url(#letterShadow)"
  >B</text>
</svg>
