<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="256" height="256">
  <!-- 盲训 favicon — 与 build/icon.svg 同源, 无圆角剪裁 (浏览器 tab 用) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0c5d56"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>
  <text
    x="512" y="512"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="640"
    font-weight="900"
    fill="#ffffff"
  >B</text>
</svg>
